<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OYM - Régulation</title>
    <link rel="icon" type="image/png" href="https://image.noelshack.com/fichiers/2026/10/3/1772659162-sans-titre-384-20260304220911.png">
    <style>
        :root { --green: #27ae60; --orange: #f39c12; --red: #e74c3c; --bg: #121412; --card: #252825; --text: #f0f2f0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; }
        
        /* La classe "status-ok", "warning" ou "critical" changera via Discord */
        .line-card { background: var(--card); border-radius: 20px; padding: 25px; width: 300px; border: 3px solid var(--green); transition: 0.5s; }
        .line-card.warning { border-color: var(--orange); }
        .line-card.critical { border-color: var(--red); }
        
        .line-img { width: 100px; margin-bottom: 10px; }
        .status-label { font-weight: bold; display: block; margin-bottom: 10px; color: var(--green); }
        .warning .status-label { color: var(--orange); }
        .critical .status-label { color: var(--red); }
        
        .terminus { border-top: 1px solid #444; padding-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1 style="color: #87a37a;">Oise Yvelines Mobilités</h1>

    <div class="grid">
        <div id="line-T3" class="line-card">
            <span id="label-T3" class="status-label">Trafic Normal</span>
            <img src="https://image.noelshack.com/fichiers/2026/10/3/1772659504-sans-titre-383-20260304222208.png" class="line-img">
            <div class="terminus">Porte du Gouesnou ↔ Gascogne Centre</div>
        </div>

        <div id="line-T12" class="line-card">
            <span id="label-T12" class="status-label">Trafic Normal</span>
            <img src="https://image.noelshack.com/fichiers/2026/10/3/1772659493-sans-titre-383-20260304222402.png" class="line-img">
            <div class="terminus">Robespierre ↔ Place des Jardins</div>
        </div>
    </div>
</body>
</html>
