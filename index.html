<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYM - Maintenance</title>
    
    <link rel="icon" type="image/png" href="https://image.noelshack.com/fichiers/2026/10/3/1772659162-sans-titre-384-20260304220911.png">

    <style>
        /* --- POLICE PARISINE --- */
        @font-face {
            font-family: 'Parisine';
            src: url('Parisine-Regular.otf') format('opentype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'Parisine';
            src: url('Parisine-Bold.otf') format('opentype');
            font-weight: bold;
        }

        :root {
            --oym-green: #87a37a; 
            --bg: #0f110f;
            --card-bg: #1a1c1a;
            --text: #f0f2f0;
            --text-sub: #888;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Parisine', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .maintenance-card {
            text-align: center;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 90%;
            position: relative;
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Animation d'entrée */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- LOGO AVEC PULSATION --- */
        .logo-wrap {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .logo-main {
            height: 100px;
            width: auto;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- TEXTES --- */
        h1 {
            font-size: 2rem;
            margin: 10px 0;
            color: var(--text);
            font-weight: bold;
        }

        .status-label {
            display: inline-block;
            color: var(--danger);
            background: rgba(231, 76, 60, 0.1);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        p {
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        /* --- BARRE DE PROGRESSION DECORATIVE --- */
        .loader-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loader-progress {
            width: 40%;
            height: 100%;
            background: var(--oym-green);
            border-radius: 10px;
            animation: slideLoader 2s infinite linear;
        }

        @keyframes slideLoader {
            from { transform: translateX(-100%); }
            to { transform: translateX(300%); }
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="logo-wrap">
            <img src="https://image.noelshack.com/fichiers/2026/10/3/1772659162-sans-titre-384-20260304220911.png" class="logo-main" alt="OYM">
        </div>

        <div class="status-label">ACCÈS RESTREINT</div>

        <h1>Plateforme Fermée</h1>
        
        <p>
            Le site <strong>Oise Yvelines Mobilités</strong> est actuellement en maintenance ou fermé au public.<br><br>
            Nos équipes préparent de nouveaux contenus. Merci de votre patience.
        </p>

        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

        <footer>
            OYM — OISE YVELINES MOBILITÉS 2026
        </footer>
    </div>

</body>
</html>
